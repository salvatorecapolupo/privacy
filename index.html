<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER_FINGERPRINT_SCANNER</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --warn: #ff3e3e; --info: #00d4ff; --border: #1a1a1a; }
        body { background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; margin: 0; padding: 20px; font-size: 13px; }
        .container { max-width: 1000px; margin: 0 auto; border: 1px solid var(--neon); padding: 30px; box-shadow: 0 0 40px rgba(0, 255, 65, 0.05); }
        
        /* Header & ID */
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--neon); padding-bottom: 20px; margin-bottom: 25px; }
        .master-id-area { flex-grow: 1; }
        .label { color: var(--info); font-size: 0.7rem; letter-spacing: 2px; }
        .alias { font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--neon); }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid var(--border); padding: 14px; text-align: left; }
        th { background: rgba(0, 255, 65, 0.05); font-size: 0.75rem; color: var(--info); }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
        .risk-alto { color: var(--warn); }
        .risk-medio { color: #ffaa00; }
        .risk-basso { color: var(--neon); }

        /* Hashing Box */
        .hash-box { background: #111; border: 1px solid var(--info); padding: 20px; margin-top: 20px; position: relative; overflow: hidden; }
        .hash-formula { font-family: serif; font-style: italic; color: #888; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .hash-result { font-size: 1.1rem; color: var(--info); word-break: break-all; font-weight: bold; }
        
        /* Social Detect */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { border: 1px solid var(--border); padding: 15px; background: #0a0a0a; }
        .positive { border-left: 4px solid var(--warn); }

        .scanline { width: 100%; height: 100px; background: linear-gradient(0deg, transparent, rgba(0,255,65,0.05), transparent); position: fixed; top: -100px; left: 0; pointer-events: none; animation: scan 3s linear infinite; }
        @keyframes scan { to { top: 100vh; } }
    </style>
</head>
<body>

<div class="scanline"></div>

<div class="container">
    <div class="header">
        <div class="master-id-area">
            <span class="label">SESSION_ALIAS_ID</span>
            <div id="user-alias" class="alias">GENERAZIONE...</div>
            <div id="ip-info" style="color:#666; margin-top:5px;">IP_ADDR: TRACING...</div>
        </div>
        <img id="qr-code" style="width: 100px; height: 100px; border: 4px solid #fff;" src="" alt="QR">
    </div>

    <table>
        <thead>
            <tr>
                <th>SENSORE</th>
                <th>DATO ACQUISITO</th>
                <th>RISCHIO</th>
                <th>LOGICA TECNICA</th>
            </tr>
        </thead>
        <tbody id="data-table"></tbody>
    </table>

    <div class="hash-box">
        <div class="label">IDENTIFICATORE UNICO HARDWARE (MASTER HASH)</div>
        <div class="hash-formula" id="hash-formula">CALCOLO FORMULA: hash( UA + GPU + CPU + RES + TZ + LANG ) = ...</div>
        <div id="master-hash" class="hash-result">CALCOLO SHA-256 IN CORSO...</div>
    </div>

    <div style="margin-top:40px;">
        <span class="label">SOCIAL_SIDE_CHANNEL_ATTACK</span>
        <div class="grid" id="social-grid"></div>
    </div>
</div>

<script>
    (function() {
        // --- 1. UTILS & HASHING ---
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const getGPU = () => {
            const gl = document.createElement('canvas').getContext('webgl');
            const dbg = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            return dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Software_Renderer";
        };

        // --- 2. DATA ACQUISITION ---
        async function run() {
            const data = {
                ua: navigator.userAgent,
                gpu: getGPU(),
                cores: navigator.hardwareConcurrency || "N/D",
                mem: navigator.deviceMemory ? `${navigator.deviceMemory}GB` : ">4GB",
                res: `${screen.width}x${screen.height}`,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                lang: navigator.language
            };

            // Costruzione Tabella
            const rows = [
                ["User Agent", data.ua, "ALTO", "Rivela versioni software vulnerabili."],
                ["GPU Renderer", data.gpu, "ALTO", "Firma hardware quasi impossibile da camuffare."],
                ["Timezone", data.tz, "MEDIO", "Geolocalizzazione bypassando i blocchi GPS."],
                ["Hardware", `${data.cores} Cores / ${data.mem} RAM`, "BASSO", "Delinea il profilo di potenza del device."],
                ["Screen", data.res, "MEDIO", "Identifica il form-factor del dispositivo."]
            ];

            document.getElementById('data-table').innerHTML = rows.map(r => `
                <tr>
                    <td><strong>${r[0]}</strong></td>
                    <td style="word-break:break-all; font-family:monospace;">${r[1]}</td>
                    <td class="risk-${r[2].toLowerCase()}">${r[2]}</td>
                    <td style="color:#888; font-size:0.7rem;">${r[3]}</td>
                </tr>
            `).join('');

            // --- 3. MASTER HASH CALCULATION ---
            const rawString = `${data.ua}|${data.gpu}|${data.cores}|${data.res}|${data.tz}|${data.lang}`;
            const finalHash = await sha256(rawString);
            
            document.getElementById('master-hash').innerText = finalHash;
            document.getElementById('hash-formula').innerText = `FORMULA: SHA-256( "${data.ua.substring(0,10)}..." + "${data.gpu}" + ${data.cores} + "${data.res}" + "${data.tz}" )`;
            
            // Alias & QR
            const alias = `FANTASMA-${finalHash.substring(0,6).toUpperCase()}`;
            document.getElementById('user-alias').innerText = alias;
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${finalHash}`;

            // IP
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
                document.getElementById('ip-info').innerText = `IP_ADDR: ${d.ip}`;
            });

            // --- 4. TIMING ATTACK ---
            const sites = [
                { name: 'Facebook', url: 'https://www.facebook.com/favicon.ico' },
                { name: 'Google', url: 'https://accounts.google.com/favicon.ico' },
                { name: 'LinkedIn', url: 'https://www.linkedin.com/favicon.ico' },
                { name: 'Twitter/X', url: 'https://twitter.com/favicon.ico' }
            ];

            sites.forEach(s => {
                const start = performance.now();
                const img = new Image();
                img.onload = img.onerror = () => {
                    const diff = performance.now() - start;
                    const isLogged = diff < 80;
                    const card = document.createElement('div');
                    card.className = `card ${isLogged ? 'positive' : ''}`;
                    card.innerHTML = `
                        <strong>${s.name}</strong><br>
                        Latenza: ${diff.toFixed(1)}ms<br>
                        <span style="color:${isLogged ? 'var(--warn)' : '#555'}">
                            ${isLogged ? '[TRACCIA RILEVATA]' : '[NESSUNA CACHE]'}
                        </span>
                    `;
                    document.getElementById('social-grid').appendChild(card);
                };
                img.src = `${s.url}?t=${Math.random()}`; // Cache-busting testuale
            });
        }

        run();
    })();
</script>

</body>
</html>
