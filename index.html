<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Fingerprint Monitor</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; --accent: #00ff41; --border: #333; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 20px; }
        .alias-box h1 { font-size: 1.2rem; margin: 0; color: var(--accent); }
        .alias-name { font-size: 2rem; font-weight: bold; }
        .qr-code img { background: white; padding: 5px; border-radius: 4px; width: 120px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: var(--card); }
        th, td { text-align: left; padding: 12px; border: 1px solid var(--border); font-size: 0.9rem; }
        th { background: #222; color: var(--accent); text-transform: uppercase; width: 30%; }
        tr:hover { background: #1d1d1d; }

        .footer { background: var(--card); padding: 15px; border-left: 4px solid var(--accent); font-size: 0.85rem; }
        .cookie-list { color: var(--accent); word-break: break-all; margin-top: 10px; display: block; }
        
        @media (max-width: 600px) {
            th, td { display: block; width: 100%; border: none; }
            th { border-top: 1px solid var(--border); padding-top: 20px; }
            .header { text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="alias-box">
            <h1>IL TUO ID BROWSER:</h1>
            <div id="user-alias" class="alias-name">Analisi...</div>
        </div>
        <div class="qr-code">
            <img id="qr-img" src="" alt="QR Code">
        </div>
    </div>

    <table id="data-table">
        <thead>
            <tr>
                <th>Parametro</th>
                <th>Dato Rilevato</th>
            </tr>
        </thead>
        <tbody id="data-body">
            </tbody>
    </table>

    <div class="footer">
        <strong>Cookie e Tracciatori Identificati:</strong>
        <span id="cookie-list" class="cookie-list">Scansione in corso...</span>
    </div>
</div>

<script>
    (function() {
        // --- 1. GENERAZIONE ALIAS UNICO ---
        function getAlias(fp) {
            const adj = ["Alpha", "Cyber", "Ghost", "Neon", "Shadow", "Quantum", "Void"];
            const noun = ["Raptor", "Node", "Protocol", "Matrix", "Hydra", "Sentinel", "Core"];
            let hash = 0;
            for (let i = 0; i < fp.length; i++) { hash = ((hash << 5) - hash) + fp.charCodeAt(i); hash |= 0; }
            const index = Math.abs(hash);
            return `${adj[index % adj.length]}-${noun[(index >> 2) % noun.length]}-${index % 1000}`;
        }

        // --- 2. RACCOLTA DATI ---
        async function buildReport() {
            const gl = document.createElement('canvas').getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "N/D";
            
            const report = {
                "Indirizzo IP": "Caricamento...",
                "User Agent": navigator.userAgent,
                "Sistema Operativo": navigator.platform,
                "Risoluzione Schermo": `${screen.width}x${screen.height}`,
                "Lingua Browser": navigator.language,
                "Core CPU": navigator.hardwareConcurrency || "N/D",
                "Memoria RAM (stima)": navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/D",
                "GPU": gpu,
                "Fuso Orario": Intl.DateTimeFormat().resolvedOptions().timeZone,
                "Cookie Abilitati": navigator.cookieEnabled ? "Sì" : "No",
                "Do Not Track": navigator.doNotTrack === "1" ? "Attivo" : "Disattivo",
                "Touch Screen": ('ontouchstart' in window) ? "Sì" : "No"
            };

            // Inserimento dati nella tabella
            const tbody = document.getElementById('data-body');
            tbody.innerHTML = Object.entries(report).map(([k, v]) => `
                <tr>
                    <th>${k}</th>
                    <td id="val-${k.replace(/\s+/g, '')}">${v}</td>
                </tr>
            `).join('');

            // Recupero IP reale
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('val-IndirizzoIP').innerText = data.ip;
                }).catch(() => {
                    document.getElementById('val-IndirizzoIP').innerText = "Bloccato da AdBlock";
                });

            // Alias e QR Code
            const fpString = navigator.userAgent + gpu + screen.width;
            const alias = getAlias(fpString);
            document.getElementById('user-alias').innerText = alias;
            document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.href)}`;
            
            // --- 3. LISTA COOKIE ---
            const cookies = document.cookie.split(';').filter(c => c.trim().length > 0);
            const commonTrackers = [];
            if (window.fbq) commonTrackers.push("Facebook Pixel");
            if (window.ga || window.gtag) commonTrackers.push("Google Analytics");
            
            const cookieNames = cookies.map(c => c.split('=')[0].trim());
            const totalTraces = [...commonTrackers, ...cookieNames];
            
            document.getElementById('cookie-list').innerText = totalTraces.length > 0 
                ? totalTraces.join(', ') 
                : "Nessun cookie locale o tracker attivo rilevato.";
        }

        buildReport();
    })();
</script>

</body>
</html>
