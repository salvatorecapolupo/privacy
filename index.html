<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Checker Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px #000; margin-bottom: 20px; }
        h1 { color: var(--accent); font-size: 1.5rem; margin-top: 0; }
        .identity { font-size: 1.2rem; font-weight: bold; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .data-point { font-size: 0.85rem; }
        .label { color: #94a3b8; display: block; margin-bottom: 2px; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; }
        .value { word-break: break-all; font-family: monospace; }
        .cookie-footer { border-top: 1px solid #334155; padding-top: 15px; font-size: 0.8rem; color: #cbd5e1; }
        .tag { background: #334155; padding: 2px 6px; border-radius: 4px; margin-right: 5px; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Identità Digitale Rilevata</h1>
        <div id="user-alias" class="identity">Generazione alias...</div>
        
        <div class="grid" id="privacy-data">
            </div>
    </div>

    <div class="card">
        <div class="cookie-footer">
            <strong>Tracce di navigazione e Tracker rilevati:</strong><br><br>
            <div id="cookie-list">Analisi dei cookie e dei servizi attivi...</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- 1. MECCANISMO DI ASSEGNAZIONE NOMI (HASH-BASED) ---
        function generateIdentity(fingerprint) {
            const adjectives = ["Rapido", "Siderale", "Etereo", "Furtivo", "Criptico", "Vigile", "Arguto"];
            const nouns = ["Leone", "Codice", "Nervo", "Falcon", "Bit", "Proxy", "Nexus"];
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
                hash |= 0;
            }
            const absHash = Math.abs(hash);
            const adj = adjectives[absHash % adjectives.length];
            const noun = nouns[(absHash >> 2) % nouns.length];
            const num = absHash % 100;
            return `${adj}-${noun}-${num}`;
        }

        // --- 2. RACCOLTA DATI ESTESA ---
        async function collectData() {
            const gl = document.createElement('canvas').getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            
            const data = {
                "User Agent": navigator.userAgent,
                "Risoluzione": `${screen.width}x${screen.height} (${window.devicePixelRatio}x)`,
                "Lingua": navigator.language,
                "Piattaforma": navigator.platform,
                "Core CPU": navigator.hardwareConcurrency || "N/D",
                "RAM stimata": navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/D",
                "Timezone": Intm.DateTimeFormat().resolvedOptions().timeZone,
                "Touch Support": ('ontouchstart' in window) ? "Sì" : "No",
                "Do Not Track": navigator.doNotTrack === "1" ? "Attivo" : "Non attivo",
                "GPU": debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "N/D",
                "Cookie Abilitati": navigator.cookieEnabled ? "Sì" : "No"
            };

            // Canvas Fingerprinting (sommario)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillText("PrivacyCheck", 10, 10);
            const canvasHash = canvas.toDataURL().substring(30, 50);
            data["Canvas ID"] = canvasHash;

            return data;
        }

        // --- 3. ANALISI COOKIE E TRACKER ---
        function analyzeTrackers() {
            const cookies = document.cookie.split(';');
            const found = [];
            
            // Simulazione rilevamento tramite check di oggetti globali comuni (History Sniffing moderna)
            const detectors = {
                "Facebook/Meta": () => window.fbq || window.FB,
                "Google Analytics": () => window.ga || window.gtag,
                "Google Ads": () => window.google_ad_client,
                "Twitter/X": () => window.twttr,
                "LinkedIn": () => window.lintrk,
                "TikTok": () => window.ttq
            };

            for (let [name, check] of Object.entries(detectors)) {
                if (check()) found.push(name);
            }

            // Aggiunta cookie locali
            if (cookies[0] !== "") {
                cookies.forEach(c => found.push(`Cookie: ${c.split('=')[0].trim()}`));
            }

            if (found.length === 0) return "Nessun cookie di terze parti leggibile direttamente. Il browser sta proteggendo la tua cronologia.";
            return found.map(f => `<span class="tag">${f}</span>`).join(", ");
        }

        // --- RENDER ---
        async function init() {
            const data = await collectData();
            const fingerprintString = data["User Agent"] + data["Risoluzione"] + data["GPU"];
            
            document.getElementById('user-alias').innerText = generateIdentity(fingerprintString);
            
            const grid = document.getElementById('privacy-data');
            grid.innerHTML = Object.entries(data).map(([label, value]) => `
                <div class="data-point">
                    <span class="label">${label}</span>
                    <span class="value">${value}</span>
                </div>
            `).join('');

            document.getElementById('cookie-list').innerHTML = analyzeTrackers();
        }

        init();
    })();
</script>

</body>
</html>
