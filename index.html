<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL PRIVACY SENSOR</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --warn: #ff3e3e; --low: #38bdf8; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-transform: uppercase; }
        .container { max-width: 1000px; margin: 0 auto; border: 1px solid var(--neon); padding: 20px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 1px dashed var(--neon); padding-bottom: 20px; }
        .glitch { font-size: 1.5rem; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .qr-area { background: #fff; padding: 10px; border: 4px double var(--neon); }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.85rem; }
        th, td { border: 1px solid rgba(0, 255, 65, 0.3); padding: 12px; text-align: left; }
        th { color: var(--bg); background: var(--neon); font-weight: bold; width: 30%; }
        .risk-high { color: var(--warn); font-weight: bold; }
        .risk-low { color: var(--low); }

        .scan-line { width: 100%; height: 2px; background: var(--neon); position: fixed; top: 0; left: 0; opacity: 0.1; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100vh; } }

        .cookie-vault { background: rgba(255, 62, 62, 0.05); border: 1px solid var(--warn); padding: 15px; margin-top: 20px; }
        .cookie-vault h3 { color: var(--warn); margin-top: 0; font-size: 0.9rem; }
        #cookie-list { color: #ccc; font-size: 0.8rem; letter-spacing: 1px; line-height: 1.5; }
        .tag { border: 1px solid #555; padding: 2px 5px; margin-right: 5px; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="scan-line"></div>

<div class="container">
    <header>
        <div>
            <div class="glitch">[ ANALISI IMPRONTA DIGITALE ]</div>
            <div style="font-size: 2.5rem;" id="user-alias">...CALCOLO...</div>
            <div id="ip-display" style="margin-top: 10px; color: var(--low);">IP: INTERCEPTING...</div>
        </div>
        <div class="qr-area">
            <img id="qr-img" src="" alt="Session ID" style="width: 100px; height: 100px;">
        </div>
    </header>

    <table id="data-table">
        <thead>
            <tr>
                <th>SENSORE</th>
                <th>VALORE INTERCETTATO</th>
                <th>LIVELLO RISCHIO</th>
            </tr>
        </thead>
        <tbody id="data-body">
            </tbody>
    </table>

    <div class="cookie-vault">
        <h3>TRACCE DI NAVIGAZIONE E IDENTIFICATORI RILEVATI:</h3>
        <div id="cookie-list">Sincronizzazione con il database dei tracker...</div>
    </div>
</div>

<script>
    (function() {
        const adjectives = ["SILENT", "VOID", "DARK", "NEON", "CYBER", "GHOST", "NULL"];
        const nouns = ["SPECTRE", "NODE", "PULSE", "REAPER", "DAEMON", "PROXY", "BIT"];

        function generateAlias(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
            const h = Math.abs(hash);
            return `${adjectives[h % adjectives.length]}_${nouns[(h >> 2) % nouns.length]}_${h % 99}`;
        }

        async function probe() {
            const gl = document.createElement('canvas').getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "HIDDEN";
            
            // Verifica AdBlock (metodo euristico)
            let adBlockActive = false;
            try { await fetch(new Request('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js', { mode: 'no-cors' })); } 
            catch (e) { adBlockActive = true; }

            const sensorData = [
                { s: "User Agent", v: navigator.userAgent, r: "ALTO" },
                { s: "GPU Vendor", v: gpu, r: "MEDIO" },
                { s: "Core Logici", v: navigator.hardwareConcurrency || "N/D", r: "BASSO" },
                { s: "RAM (Stima)", v: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "N/D", r: "BASSO" },
                { s: "Risoluzione", v: `${screen.width}x${screen.height}`, r: "MEDIO" },
                { s: "Lingua", v: navigator.language, r: "BASSO" },
                { s: "AdBlocker", v: adBlockActive ? "ATTIVO" : "NON RILEVATO", r: adBlockActive ? "BASSO" : "ALTO" },
                { s: "Incognito", v: (navigator.storage && navigator.storage.estimate) ? "PROBABILE NO" : "RILEVATO", r: "ALTO" }
            ];

            // Render Tabella
            document.getElementById('data-body').innerHTML = sensorData.map(d => `
                <tr>
                    <td>${d.s}</td>
                    <td>${d.v}</td>
                    <td class="${d.r === 'ALTO' ? 'risk-high' : 'risk-low'}">${d.r}</td>
                </tr>
            `).join('');

            // IP e QR
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json()).then(data => document.getElementById('ip-display').innerText = `IP: ${data.ip}`);
            
            const alias = generateAlias(navigator.userAgent + gpu);
            document.getElementById('user-alias').innerText = alias;
            document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(alias)}`;

            // --- COOKIE SENSITIVITY ---
            // Dato che non possiamo leggere cookie di altri siti, mostriamo cosa un tracker saprebbe di te
            const cookies = document.cookie.split(';').filter(c => c.length > 0).map(c => c.split('=')[0].trim());
            const potentialTrackers = [];
            
            // Analisi dei "segnali" nel DOM
            if (window.chrome) potentialTrackers.push("GOOGLE_ECOSYSTEM");
            if (navigator.share) potentialTrackers.push("MOBILE_USER_SIGNATURE");
            if (Intl.DateTimeFormat().resolvedOptions().timeZone) potentialTrackers.push("LOCATION_ZONE_LEAK");
            
            const allTraces = [...cookies, ...potentialTrackers];
            document.getElementById('cookie-list').innerHTML = allTraces.length > 0 
                ? allTraces.map(t => `<span class="tag">${t}</span>`).join(", ")
                : "NESSUNA TRACCIA LOCALE IDENTIFICATA. SEI UN FANTASMA.";
        }

        probe();
    })();
</script>

</body>
</html>
